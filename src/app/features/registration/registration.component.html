<div class="register-container">
    <!-- Registration Form Section -->
    <section class="registration-form-section">
      <div class="container">
        <h2>Formulario de Registro</h2>
        <form #registerForm="ngForm" (ngSubmit)="onSubmit(registerForm)">
          <div class="form-group">
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" name="name" [(ngModel)]="user.name" required class="form-control" placeholder="Ingresa tu nombre">
          </div>
  
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" [(ngModel)]="user.email" required class="form-control" placeholder="Ingresa tu correo electrónico">
          </div>
  
          <div class="form-group">
            <label for="phone">Número de Teléfono (opcional)</label>
            <input type="text" id="phone" name="phone" [(ngModel)]="user.numberPhone" class="form-control" placeholder="Ingresa tu número de teléfono">
          </div>
  
          <div class="form-group">
            <label for="address">Dirección</label>
            <input type="text" id="address" name="address" [(ngModel)]="user.address" required class="form-control" placeholder="Ingresa tu dirección">
          </div>
  
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" [(ngModel)]="user.password" required class="form-control" placeholder="Crea una contraseña">
          </div>
  
          <div class="form-group">
            <label for="confirmPassword">Confirmar Contraseña</label>
            <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="user.confirmPassword" required class="form-control" placeholder="Confirma tu contraseña">
          </div>
  
          <button type="submit" class="btn-primary" [disabled]="registerForm.invalid">Registrar</button>
        </form>
      </div>
    </section>
  </div>
